<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button{
            width: 200px;
            height: 80px;
            border: 4px solid black;
            border-radius: 30px;
            position: relative;
            background: green;
            overflow: hidden;
            cursor: pointer;
        }
        .button:hover{
            animation: button 2s;
        }
        @keyframes button{
            0%{

            }
            25%{
                transform: translate(2px,-10px);
            }
            50%{
                transform: translate(4px, 10px);
            }
            75%{
                transform: translate(-2px, -10px);
            }
            100%{
                transform: translate(-4px, 10px);
            }
        }
        .button p{
            width: 100%;
            height: 100%;
            text-align: center;
            position: relative;
            padding-top: 5px;
            font-size: 24px;
            font-weight: 800;
            z-index: 10;
            color: white;
        }

        .button .btn-blue{
            width: 0%;
            height: 100%;
            background: blue;
            position: absolute;
            top: 0;
            transition: all 2s;
        }
        .button:hover .btn-blue{
            width: 100%;

        }
    </style>
</head>
<body>
    <div class="button">
        <p>Button</p>
        <div class="btn-blue"></div> 
        <div class="btn-green"></div>
    </div>
</body>
</html>
